services:
  sap-mock:
    build: ./backend/mocks/sap
    container_name: sap-mock
    ports:
      - "8000:8080"

  backend:
    build: ./backend
    container_name: connect-analyzer-backend
    ports:
      - "5080:8080"
    # Pull SalesSource, Sap__* and Shopify__* from the root .env (gitignored). Optional so a
    # mock-only run still works if .env is absent; see .env.example for the full list.
    env_file:
      - path: .env
        required: false
    environment:
      # Override anything .env might set for non-docker runs: inside the compose network the
      # mock service is reachable as sap-mock:8080, never localhost.
      - SapMock__BaseUrl=http://sap-mock:8080
      # The image runs as the non-root $APP_UID user (see backend/Dockerfile); /app belongs to
      # root so the SQLite file cannot live there. /tmp is world-writable on the dotnet/aspnet
      # image. Matches the Cloud Run production path.
      - Sqlite__Path=/tmp/sales.db
    depends_on:
      - sap-mock

  frontend:
    build: ./frontend
    container_name: connect-analyzer-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
