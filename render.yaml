# Render Blueprint for the SAP Analyzer live demo (mock + backend).
#
# Deploy: at https://dashboard.render.com -> New + -> Blueprint -> connect this repo.
# Render reads this file, creates both services on the Free plan and assigns *.onrender.com URLs.
# Free Web Services sleep after ~15 min of inactivity; the first hit cold-starts in ~30-50s.
#
# Frontend (Next.js) lives on Vercel — see DEPLOY.md.

services:
  # ------------------------------------------------------------------
  # Simulated SAP source: nginx serving the pipe-delimited Latin-1 .txt.
  # ------------------------------------------------------------------
  - type: web
    name: sap-analyzer-mock
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./sap-mock/Dockerfile
    dockerContext: ./sap-mock
    healthCheckPath: /sales.txt
    envVars:
      # The container binds to 8080; tell Render to route to that port.
      - key: PORT
        value: 8080

  # ------------------------------------------------------------------
  # Backend API: .NET 10 reading from the mock (or real SAP) into SQLite.
  # ------------------------------------------------------------------
  - type: web
    name: sap-analyzer-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/sales
    envVars:
      - key: PORT
        value: 8080
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Render Free has no private networking, so the backend reaches the mock over its
      # public URL. If Render had to suffix the mock service name (global uniqueness), edit
      # this value to match the actual onrender.com hostname after the first deploy.
      - key: SapMock__BaseUrl
        value: https://sap-analyzer-mock.onrender.com
      # Source for ISalesRepository: Mock (default, no secret) or Sap (requires Sap__ApiKey).
      - key: SalesSource
        value: Mock
      # SQLite file path. We write to /tmp because the container's WORKDIR (/app) belongs
      # to root in the base image and the app runs as non-root ($APP_UID), so /app is not
      # writable. /tmp is world-writable and always works. It is ephemeral — Free Web
      # Services have no persistent disk anyway, and the seed-on-startup repopulates it on
      # each cold start, which is fine for the demo.
      - key: Sqlite__Path
        value: /tmp/sales.db
      # API key for the real SAP sandbox. Only needed if SalesSource=Sap.
      # `sync: false` keeps it out of the Blueprint; set it manually in the Render dashboard.
      - key: Sap__ApiKey
        sync: false
