# fly.toml for the simulated SAP source (nginx serving a Latin-1 pipe-delimited .txt).
#
# Workflow:
#   1) cd sap-mock
#   2) flyctl launch --no-deploy   (accept THIS fly.toml when prompted)
#   3) flyctl deploy
#
# `app` and `primary_region` may need adjusting — Fly app names are globally unique.

app = "sap-analyzer-mock"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"
